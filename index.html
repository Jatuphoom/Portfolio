<style>
    html {
        scroll-behavior: smooth;
    }

    body {
        margin: 0;
        font-family: 'Kanit', sans-serif;
        scroll-snap-type: y proximity;
        overflow-y: scroll;
        background-color: #131313;
        color: white;
    }

    section {
        min-height: 100vh;
        padding: 10px 20px;
        text-align: center;
        scroll-snap-align: start;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .cover {
        background-color: #131313;
        color: white;
        font-size: 100px;
        font-weight: bold;
    }

    .cover-subtitle {
        font-size: 30px;
        font-family: 'Kanit', sans-serif;
        color: White;
        margin-top: 20px;
    }

    .just-text {
        font-size: 30px;
        font-family: 'Kanit', sans-serif;
        color: White;
    }
    
    .cover-image {
        margin-top: 30px;
        max-width: 300px;
        height: auto;
        border-radius: 8px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .showreels,
    .others {
        background-color: #131313;
    }

    .showreels h2,
    .others h2 {
        font-size: 80px;
        margin-bottom: 20px;
    }

    .video-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .video-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 360px;
    }

    .video-item span {
        color: white;
        margin-bottom: 10px;
        font-size: 24px;
        font-family: 'Kanit', sans-serif;
    }

    .video-item iframe {
        transition: transform 0.3s ease;
    }

    .video-item iframe:hover {
        transform: scale(1.03);
    }

    .video-box {
        width: 100%;
        max-width: 360px;
        aspect-ratio: 9 / 16;
        /* แนวตั้ง */
        background-color: #ccc;
    }

    .video-box-horizontal {
        width: 100%;
        aspect-ratio: 16 / 9;
        background-color: #ccc;
    }

    .section4 .video-item {
        max-width: 100%;
        width: 100%;
    }

    .section4 .video-box-horizontal {
        width: 100%;
        max-width: 650px;
        aspect-ratio: 16 / 9;
        background-color: #ccc;
    }

    .section4 {
        min-height: auto;
        padding-top: 20px;
    }

    @media (max-width: 768px) {
        .video-container {
            flex-direction: column;
            align-items: center;
        }

        .section4 .video-box-horizontal {
            max-width: 100%;
        }
    }
</style>
</head>

<body>

    <!-- Section 1: Cover -->
